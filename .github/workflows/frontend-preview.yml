name: Frontend Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: frontend-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-preview:
    name: Build frontend preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run docs:build

      - name: Upload preview artifact
        id: preview-artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-preview-pr-${{ github.event.pull_request.number || github.run_id }}
          path: .vitepress/dist
          if-no-files-found: error
          retention-days: 7

      - name: Write preview summary
        env:
          ARTIFACT_URL: ${{ steps.preview-artifact.outputs.artifact-url }}
        run: |
          {
            echo "### Frontend preview"
            echo ""
            echo "Built frontend-only preview artifact: ${ARTIFACT_URL}"
            echo ""
            echo "This workflow runs \`npm run docs:build\` only. It does not build Tauri/native packages."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview artifact on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.preview-artifact.outputs.artifact-url }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- frontend-preview-artifact -->';
            const body = [
              marker,
              '## Frontend preview',
              '',
              'A frontend-only preview artifact was built for this PR.',
              '',
              `- Preview artifact: ${process.env.ARTIFACT_URL}`,
              `- Workflow run: ${process.env.RUN_URL}`,
              '',
              'To view locally, download and unzip the artifact, then serve the extracted directory:',
              '',
              '```sh',
              'python3 -m http.server 4173 -d .',
              '```',
              '',
              'Then open http://127.0.0.1:4173/.',
              '',
              'This preview runs `npm run docs:build` only; it does not build Tauri/native packages.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
