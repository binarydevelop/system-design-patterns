name: Frontend Preview Build

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-preview-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-preview:
    name: Build frontend preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run docs:build

      - name: Write preview summary
        run: |
          {
            echo "### Frontend preview build"
            echo ""
            echo "Built the same frontend output Vercel will host for PR previews."
            echo ""
            echo "This workflow runs \`npm run docs:build\` only. It does not build Tauri/native packages."
          } >> "$GITHUB_STEP_SUMMARY"
