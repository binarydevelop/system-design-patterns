          }
          .atlas {
            --atlas-bg: #101211;
            --atlas-ink: #f2f2ed;
            --atlas-muted: #acb0aa;
            --atlas-rule: rgba(242, 242, 237, 0.15);
            --atlas-paper: #f3f3ee;
            --atlas-black: #111311;
            --atlas-flare: #fa563c;
            --atlas-mint: #16c49b;
            --atlas-blue: #4d7fff;
            --atlas-yellow: #ffc23c;
            width: 100%;
            margin: -32px 0 0;
            overflow-x: clip;
            background: var(--atlas-bg);
            color: var(--atlas-ink);
          }
          .atlas a {
            color: inherit;
            text-decoration: none;
          }
          .atlas-hero {
            position: relative;
            min-height: clamp(610px, calc(100svh - 116px), 790px);
            padding: clamp(30px, 4vw, 52px) clamp(20px, 5vw, 72px) 96px;
            overflow: hidden;
            background: var(--atlas-bg);
            border-bottom: 1px solid var(--atlas-rule);
          }
          .atlas-traces {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
              repeating-linear-gradient(90deg, transparent 0 79px, rgba(242, 242, 237, 0.045) 79px 80px),
              repeating-linear-gradient(0deg, transparent 0 79px, rgba(242, 242, 237, 0.045) 79px 80px);
          }
          .trace {
            position: absolute;
            display: block;
            background: var(--atlas-rule);
          }
          .trace::after {
            position: absolute;
            width: 10px;
            height: 10px;
            content: '';
            background: var(--atlas-flare);
            animation: atlas-signal 5s linear infinite;
          }
          .trace-a { top: 22%; right: 4%; width: 44%; height: 1px; }
          .trace-a::after { top: -4px; left: 0; }
          .trace-b { top: 13%; right: 32%; width: 1px; height: 63%; }
          .trace-b::after { top: 0; left: -4px; animation-delay: -1.2s; background: var(--atlas-mint); }
          .trace-c { bottom: 18%; right: 8%; width: 38%; height: 1px; }
          .trace-c::after { top: -4px; left: 0; animation-delay: -2.4s; background: var(--atlas-yellow); }
          .trace-d { top: 35%; right: 12%; width: 1px; height: 43%; }
          .trace-d::after { top: 0; left: -4px; animation-delay: -3.1s; background: var(--atlas-blue); }
          @keyframes atlas-signal {
            0% { transform: translate(0, 0); opacity: 0; }
            8% { opacity: 1; }
            92% { opacity: 1; }
            100% { transform: translate(190px, 0); opacity: 0; }
          }
          .trace-b::after,
          .trace-d::after {
            animation-name: atlas-signal-vertical;
          }
          @keyframes atlas-signal-vertical {
            0% { transform: translate(0, 0); opacity: 0; }
            8% { opacity: 1; }
            92% { opacity: 1; }
            100% { transform: translate(0, 190px); opacity: 0; }
          }
          .atlas-hero-inner {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(390px, 0.9fr) minmax(450px, 1.05fr);
            gap: clamp(38px, 5vw, 84px);
            max-width: 1360px;
            margin: 0 auto;
          }
          .atlas-copy {
            align-self: center;
            min-width: 0;
          }
          .atlas-kicker {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            max-width: 600px;
            margin-bottom: clamp(26px, 4vw, 42px) !important;
            color: var(--atlas-mint);
            font-size: 0.73rem;
            font-weight: 700;
            text-transform: uppercase;
          }
          .atlas-copy h1 {
            margin: 0;
            color: var(--atlas-ink);
            font-size: clamp(4.25rem, 7.7vw, 7.2rem);
            font-weight: 780;
            line-height: 0.86;
            letter-spacing: 0;
            text-transform: uppercase;
          }
          .atlas-copy h1 span {
            display: block;
            white-space: nowrap;
          }
          .atlas-copy h1 span:nth-child(2) {
            color: var(--atlas-flare);
          }
          .atlas-deck {
            max-width: 510px;
            margin-top: clamp(26px, 4vw, 36px) !important;
            color: var(--atlas-muted);
            font-size: 1.04rem;
            line-height: 1.65;
          }
          .atlas-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            align-items: center;
            margin-top: 34px;
          }
          .atlas-actions a {
            color: var(--atlas-muted);
            font-size: 0.94rem;
            font-weight: 600;
          }
          .atlas-actions a:hover {
            color: var(--atlas-ink);
          }
          .atlas-actions .atlas-start {
            display: inline-flex;
            align-items: center;
            gap: 26px;
            padding: 17px 20px;
            border-radius: 4px;
            color: var(--atlas-black);
            background: var(--atlas-yellow);
          }
          .atlas-actions .atlas-start:hover {
            color: var(--atlas-black);
            background: var(--atlas-ink);
          }
          .atlas-actions b,
          .atlas-route-list b,
          .atlas-evidence b {
            font-size: 1.2rem;
            font-weight: 400;
          }
          .atlas-topology {
            align-self: stretch;
            min-height: 560px;
          }
          .atlas-map-title {
            display: flex;
            justify-content: space-between;
            color: var(--atlas-muted);
            font-size: 0.73rem;
            font-weight: 700;
            text-transform: uppercase;
          }
          .atlas-map-title strong {
            color: var(--atlas-yellow);
            font-weight: inherit;
          }
          .atlas-map {
            position: relative;
            height: 530px;
            margin-top: 18px;
          }
          .atlas-map::before,
          .atlas-map::after {
            position: absolute;
            content: '';
            pointer-events: none;
          }
          .atlas-map::before {
            inset: 74px 78px 68px 56px;
            border: 1px solid rgba(22, 196, 155, 0.35);
          }
          .atlas-map::after {
            top: 48%;
            left: 48%;
            width: 300px;
            height: 300px;
            border: 1px dashed rgba(250, 86, 60, 0.42);
            transform: translate(-50%, -50%) rotate(45deg);
          }
          .atlas-core {
            position: absolute;
            z-index: 2;
            top: 48%;
            left: 48%;
            display: flex;
            width: 108px;
            height: 108px;
            flex-direction: column;
            justify-content: center;
            border: 1px solid var(--atlas-flare);
            color: var(--atlas-ink);
            text-align: center;
            background: var(--atlas-black);
            transform: translate(-50%, -50%);
          }
          .atlas-core strong {
            color: var(--atlas-flare);
            font-size: 1.05rem;
          }
          .atlas-core small {
            color: var(--atlas-muted);
            text-transform: uppercase;
          }
          .atlas-node {
            position: absolute;
            z-index: 2;
            display: block;
            min-width: 108px;
            padding: 10px 12px;
            border-left: 3px solid var(--atlas-blue);
            background: rgba(16, 18, 17, 0.92);
            transition: background 0.15s ease, border-color 0.15s ease;
          }
          .atlas-node:hover {
            background: #252825;
            border-color: var(--atlas-yellow);
          }
          .atlas-node small {
            display: block;
            color: var(--atlas-muted);
            font-size: 0.68rem;
          }
          .atlas-node strong {
            display: block;
            margin-top: 4px;
            font-size: 0.9rem;
          }
          .atlas-n1 { top: 7%; left: 0; border-color: var(--atlas-mint); }
          .atlas-n2 { top: 4%; right: 10%; border-color: var(--atlas-blue); }
          .atlas-n3 { top: 36%; right: 0; border-color: var(--atlas-blue); }
          .atlas-n4 { bottom: 13%; right: 10%; border-color: var(--atlas-yellow); }
          .atlas-n5 { bottom: 4%; left: 33%; border-color: var(--atlas-mint); }
          .atlas-n6 { bottom: 17%; left: 0; border-color: var(--atlas-flare); }
          .atlas-n7 { top: 42%; left: 0; border-color: var(--atlas-mint); }
          .atlas-n8 { top: 20%; left: 35%; border-color: var(--atlas-yellow); }
          .atlas-n9 { top: 62%; right: 2%; border-color: var(--atlas-flare); }
          .atlas-metrics {
            position: absolute;
            z-index: 2;
            right: clamp(20px, 5vw, 72px);
            bottom: 0;
            left: clamp(20px, 5vw, 72px);
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            max-width: 1360px;
            margin: 0 auto;
            border-top: 1px solid var(--atlas-rule);
          }
          .atlas-metrics p {
            display: flex;
            gap: 14px;
            align-items: baseline;
            padding: 19px 0;
          }
          .atlas-metrics p + p {
            padding-left: clamp(14px, 3vw, 30px);
            border-left: 1px solid var(--atlas-rule);
          }
          .atlas-metrics strong {
            color: var(--atlas-yellow);
            font-size: 1.55rem;
          }
          .atlas-metrics span {
            color: var(--atlas-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
          }
          .atlas-paths,
          .atlas-library,
          .atlas-evidence {
            padding: clamp(48px, 7vw, 88px) clamp(20px, 5vw, 72px);
            background: var(--atlas-paper);
            color: var(--atlas-black);
          }
          .atlas-heading {
            display: grid;
            grid-template-columns: 190px minmax(0, 650px);
            gap: clamp(24px, 4vw, 64px);
            max-width: 1360px;
            margin: 0 auto clamp(38px, 5vw, 62px);
          }
          .atlas-heading p,
          .atlas-evidence header p {
            color: var(--atlas-flare);
            font-size: 0.76rem;
            font-weight: 750;
            text-transform: uppercase;
          }
          .atlas-heading h2,
          .atlas-evidence h2 {
            font-size: clamp(2.15rem, 4vw, 3.8rem);
            font-weight: 650;
            line-height: 1.05;
          }
          .atlas-route-list {
            display: grid;
            max-width: 1360px;
            margin: 0 auto;
            border-top: 2px solid var(--atlas-black);
          }
          .atlas-route-list a {
            display: grid;
            grid-template-columns: minmax(120px, 0.8fr) minmax(220px, 1fr) minmax(220px, 1.1fr) 34px;
            gap: 24px;
            align-items: center;
            min-height: 88px;
            border-bottom: 1px solid #d0d2ca;
            transition: background 0.15s ease;
          }
          .atlas-route-list a:hover {
            background: #e5e7df;
          }
          .atlas-route-list span {
            color: var(--atlas-flare);
            font-size: 0.74rem;
            font-weight: 750;
            text-transform: uppercase;
          }
          .atlas-route-list strong {
            font-size: 1.16rem;
          }
          .atlas-route-list small {
            color: #5d625d;
            font-size: 0.92rem;
          }
          .atlas-library {
            border-top: 1px solid #d0d2ca;
            background: #fafaf7;
          }
          .atlas-index {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            max-width: 1360px;
            margin: 0 auto;
            border-top: 2px solid var(--atlas-black);
          }
          .atlas-index a {
            display: grid;
            grid-template-columns: 44px 1fr;
            gap: 0 14px;
            align-content: center;
            min-height: 98px;
            padding-right: 24px;
            border-bottom: 1px solid #d0d2ca;
          }
          .atlas-index a:not(:nth-child(3n + 1)) {
            padding-left: 24px;
            border-left: 1px solid #d0d2ca;
          }
          .atlas-index a:hover strong {
            color: var(--atlas-flare);
          }
          .atlas-index span {
            grid-row: span 2;
            color: var(--atlas-flare);
            font-size: 0.8rem;
            font-weight: 750;
          }
          .atlas-index strong {
            font-size: 1.03rem;
          }
          .atlas-index small {
            margin-top: 6px;
            color: #606560;
          }
          .atlas-evidence {
            display: grid;
            grid-template-columns: minmax(240px, 0.75fr) minmax(420px, 1.4fr);
            gap: clamp(28px, 7vw, 100px);
            background: var(--atlas-yellow);
          }
          .atlas-evidence nav {
            border-top: 2px solid var(--atlas-black);
          }
          .atlas-evidence a {
            display: grid;
            grid-template-columns: 145px 1fr 30px;
            gap: 20px;
            align-items: center;
            min-height: 76px;
            border-bottom: 1px solid rgba(17, 19, 17, 0.25);
          }
          .atlas-evidence span {
            font-size: 0.74rem;
            font-weight: 750;
            text-transform: uppercase;
          }
          @media (max-width: 1020px) {
            .atlas-hero-inner {
              grid-template-columns: 1fr;
            }
            .atlas-hero {
              padding-bottom: 92px;
            }
            .atlas-topology {
              min-height: 420px;
            }
            .atlas-map {
              height: 400px;
              max-width: 650px;
            }
            .atlas-index {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .atlas-index a:nth-child(3n + 1) {
              padding-left: 24px;
              border-left: 1px solid #d0d2ca;
            }
            .atlas-index a:nth-child(2n + 1) {
              padding-left: 0;
              border-left: none;
            }
          }
          @media (max-width: 680px) {
            .atlas {
              margin-top: -24px;
            }
            .atlas-hero {
              min-height: 0;
              padding: 34px 16px;
            }
            .atlas-traces {
              opacity: 0.62;
              background-size: 48px 48px;
            }
            .trace-a,
            .trace-c {
              width: 92%;
            }
            .atlas-hero-inner {
              display: block;
            }
            .atlas-kicker {
              margin-bottom: 22px !important;
              font-size: 0.66rem;
            }
            .atlas-copy h1 {
              font-size: clamp(3.05rem, 16.6vw, 3.8rem);
              line-height: 0.9;
            }
            .atlas-deck {
              max-width: 338px;
              margin-top: 20px !important;
              font-size: 0.9rem;
              line-height: 1.58;
            }
            .atlas-actions {
              gap: 14px 18px;
              margin-top: 24px;
            }
            .atlas-actions .atlas-start {
              width: 100%;
              justify-content: space-between;
              padding: 14px 16px;
            }
            .atlas-topology {
              min-height: 0;
              margin-top: 36px;
            }
            .atlas-map-title {
              display: none;
            }
            .atlas-map {
              height: 282px;
              margin: 0;
            }
            .atlas-map::before {
              inset: 42px 38px 30px;
            }
            .atlas-map::after {
              width: 158px;
              height: 158px;
            }
            .atlas-core {
              width: 76px;
              height: 76px;
            }
            .atlas-core strong {
              font-size: 0.86rem;
            }
            .atlas-node {
              min-width: 84px;
              padding: 7px 8px;
            }
            .atlas-node strong {
              font-size: 0.74rem;
            }
            .atlas-n1 { top: 4%; left: 0; }
            .atlas-n2 { top: 4%; right: 0; }
            .atlas-n3 { top: 43%; right: 0; }
            .atlas-n4 { bottom: 0; right: 0; }
            .atlas-n5 { bottom: 0; left: 33%; }
            .atlas-n6 { bottom: 0; left: 0; }
            .atlas-n7 { top: 43%; left: 0; }
            .atlas-n8,
            .atlas-n9 {
              display: none;
            }
            .atlas-metrics {
              display: none;
            }
            .atlas-paths,
            .atlas-library,
            .atlas-evidence {
              padding: 42px 16px;
            }
            .atlas-heading {
              display: block;
              margin-bottom: 30px;
            }
            .atlas-heading h2,
            .atlas-evidence h2 {
              margin-top: 12px;
              font-size: 2rem;
            }
            .atlas-route-list a {
              grid-template-columns: 1fr 28px;
              gap: 7px 12px;
              padding: 17px 0;
            }
            .atlas-route-list span,
            .atlas-route-list strong,
            .atlas-route-list small {
              grid-column: 1;
            }
            .atlas-route-list b {
              grid-column: 2;
              grid-row: 1 / span 3;
            }
            .atlas-index {
              grid-template-columns: 1fr;
            }
            .atlas-index a,
            .atlas-index a:not(:nth-child(3n + 1)),
            .atlas-index a:nth-child(3n + 1) {
              min-height: 84px;
              padding-left: 0;
              border-left: none;
            }
            .atlas-evidence {
              display: block;
            }
            .atlas-evidence nav {
              margin-top: 28px;
            }
            .atlas-evidence a {
              grid-template-columns: 1fr 28px;
              gap: 4px 12px;
              padding: 14px 0;
            }
            .atlas-evidence strong {
              grid-column: 1;
            }
            .atlas-evidence b {
              grid-column: 2;
              grid-row: 1 / span 2;
            }
          }
          @media (prefers-reduced-motion: reduce) {
            .trace::after {
              animation: none;
            }
          }
          </style>
